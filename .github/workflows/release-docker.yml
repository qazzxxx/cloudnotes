# 仅在推送形如 v1.2.3 的 tag 时触发发布，避免误把任意分支/任意 tag 推上去
name: release-docker

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# 防止并发推送同一 tag 时的竞态（如本地重试 + 远程重试）
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 校验 tag 形状（vX.Y.Z），防止 v1.2 之类的 tag 走完整流程却生成不完整版本
      - name: Validate tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver (expected vX.Y.Z)"
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker/metadata-action 自动从 tag 生成多个标签：
      #   v1.2.3 -> 1.2.3, 1.2, 1, latest
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: qazzxxx/cloudnotes
          # flavor=latest=auto：tag 事件默认把当前 tag 同时打为 latest
          # （若未来加 main 分支触发，可改为 enable={{is_default_branch}} 隔离语义）
          flavor: latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA 自带层缓存：buildx 会按 platform 分别 namespace
          cache-from: type=gha
          cache-to: type=gha,mode=max
