services:
  cloudnote:
    # 直接拉线上镜像，不再本地 build
    image: qazzxxx/cloudnotes:latest
    container_name: cloudnote
    restart: unless-stopped
    ports:
      - "3130:3130"
    environment:
      NAS_PASSWORD: "your_secure_password_here"   # 🔧 登录密码（留空 = 开放模式）
      # ── AI 助手（可选，OpenAI 兼容）── 三项都填才启用；留空 = 编辑器无 AI。Key 仅存服务端，不暴露给前端。
      AI_BASE_URL: ""
      AI_API_KEY: ""
      AI_MODEL: ""
      # 其余可选项（JWT_SECRET / CORS_ORIGIN / JWT_EXPIRES_HOURS / PORT / ROOT_SPACE / NODE_ENV 等）
      # 见 .env.example；不填即用默认值（PORT/ROOT_SPACE/NODE_ENV 已在镜像内置）。
    volumes:
      # 🔧 改为你 NAS 上实际存放笔记的目录 → 容器 /data/notes
      - ./notes:/data/notes
